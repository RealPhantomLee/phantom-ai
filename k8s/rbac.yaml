apiVersion: v1
kind: ServiceAccount
metadata:
  name: phantom-ai-agent
  namespace: phantom-ai
---
# Cluster-wide read access: nodes, namespaces, and workload state across all namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: phantom-ai-reader
rules:
- apiGroups: [""]
  resources: ["nodes", "namespaces", "pods", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["nodes", "pods"]
  verbs: ["get", "list"]
---
# Write access scoped to phantom-ai namespace only; no delete on stateful resources
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: phantom-ai-writer
  namespace: phantom-ai
rules:
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "delete"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: phantom-ai-reader-binding
subjects:
- kind: ServiceAccount
  name: phantom-ai-agent
  namespace: phantom-ai
roleRef:
  kind: ClusterRole
  name: phantom-ai-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: phantom-ai-writer-binding
  namespace: phantom-ai
subjects:
- kind: ServiceAccount
  name: phantom-ai-agent
  namespace: phantom-ai
roleRef:
  kind: Role
  name: phantom-ai-writer
  apiGroup: rbac.authorization.k8s.io
